<tr class="transition-all">
    <td>
        <input type="text" readonly class="form-control-plaintext" value="{{ student_nisn }}">
        <input type="hidden" name="{{ step }}-{{ idx }}-student_nisn" value="{{ student_nisn }}">
    </td>
    <td>
        <input type="text" readonly class="form-control-plaintext" value="{{ student_name }}">
        <input type="hidden" name="{{ step }}-{{ idx }}-student_name" value="{{ student_name }}">
    </td>

    <td id="score_td_{{ idx }}">
        <input type="text"
               name="{{ step }}-{{ idx }}-score"
               value="{{ score }}"
               class="form-control score-input">
    </td>

    <td id="na_reason_td_{{ idx }}">
        <input type="text"
               name="{{ step }}-{{ idx }}-na_reason"
               value="{{ na_reason }}"
               class="form-control na-reason-input"
               {% if is_active %}readonly style="background-color: #e9ecef; cursor: not-allowed;"{% else %}placeholder="Enter reason..."{% endif %}>
    </td>

    <td class="text-center">
        <input type="checkbox"
               name="{{ step }}-{{ idx }}-is_active"
               {% if is_active %}checked{% endif %}
               hx-get="/gradebook/toggle-na-reason/?form_index={{ idx }}&step={{ step }}"
               hx-trigger="change"
               hx-target="#na_reason_td_{{ idx }}"
               hx-swap="innerHTML"
               hx-include="[name='{{ step }}-{{ idx }}-is_active']">
    </td>
</tr>
