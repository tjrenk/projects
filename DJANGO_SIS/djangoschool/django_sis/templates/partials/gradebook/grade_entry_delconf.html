{% extends "base_gradebook.html" %}

{% block content %}
 
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="main-content h-full max-md:p-3 p-5 pt-2 pb-0">
                <div class="card bg-base-100 shadow-md lg:p-6 p-3">
                    <div class="card-header">
                        <h2 class="mb-0"><strong>Are you sure you want to delete this grade entry data?</strong></h2>
                    </div>
                    <div class="card-body">
                        <p></p>
                        <ul>
                            <li><strong>Topic: {{ ahead.topic }}</strong></li>
                            <li><strong>Date: {{ ahead.date }}</strong></li>
                            <li><strong>Max Score: {{ ahead.max_score }}</strong></li>
<!--                            <li><strong>Learning Targets: {{ ahead.cpmp_target|linebreaksbr }}</strong></li>-->
                        </ul>
                        
                        <form method="post" class="mt-4">
                            {% csrf_token %}
                            <div class="flex gap-4">
                                <button onclick="history.back()" class="btn btn-outline cancel-link">Cancel</button>
                                <button type="submit" class="btn btn-error">Delete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
